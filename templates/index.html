<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingo — Language Translation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="page">
    <div class="brand-row">
      <span class="orb" aria-hidden="true"></span>
      <div>
        <h1>Lingo</h1>
        <p>Translate text between languages, instantly</p>
      </div>
    </div>

    <div class="card">
      <form id="translate-form">
        <div class="lang-row">
          <div class="lang-pill">
            <select id="source_language" name="source_language" aria-label="Source language">
              <option value="">Detect language</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="zh-Hans">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="ru">Russian</option>
              <option value="ar">Arabic</option>
            </select>
          </div>

          <button type="button" class="swap-btn" id="swap-btn" aria-label="Swap languages" title="Swap languages">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 7H17M17 7L13 3M17 7L13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17 17H7M7 17L11 13M7 17L11 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div class="lang-pill">
            <select id="target_language" name="target_language" aria-label="Target language">
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr" selected>French</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="zh-Hans">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="ru">Russian</option>
              <option value="ar">Arabic</option>
            </select>
          </div>
        </div>

        <div class="compose">
          <textarea id="text" name="text" placeholder="Type or paste text to translate…" aria-label="Text to translate"></textarea>
          <div class="compose-footer">
            <span class="char-count" id="char-count">0 characters</span>
            <button type="submit" class="translate-btn" id="translate-btn">
              <span class="spinner" aria-hidden="true"></span>
              <span class="btn-label">Translate</span>
              <svg class="btn-label" width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 11L21 3L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </form>

      <div class="result-wrap" id="result-wrap">
        <div class="result-row">
          <span class="orb small" aria-hidden="true"></span>
          <div class="bubble" id="result-bubble">
            <div class="bubble-label">
              <span>Translation</span>
              <button type="button" class="copy-btn" id="copy-btn">Copy</button>
            </div>
            <p id="result-text"></p>
          </div>
        </div>
      </div>

      <noscript>
        {% if translated_text %}
        <div class="result-wrap visible">
          <div class="result-row">
            <span class="orb small" aria-hidden="true"></span>
            <div class="bubble"><p>{{ translated_text }}</p></div>
          </div>
        </div>
        {% endif %}
      </noscript>
    </div>

    <footer class="hint">Powered by Microsoft Translator</footer>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
